# inventory.yml — Ansible inventory defining server groups and variables

---
all:
  vars:
    ansible_user: azureuser
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3

  children:
    # --- Web servers (Nginx) ---
    webservers:
      hosts:
        web01:
          ansible_host: 10.0.1.10
          nginx_port: 80
        web02:
          ansible_host: 10.0.1.11
          nginx_port: 80
      vars:
        nginx_worker_processes: auto

    # --- Application servers ---
    appservers:
      hosts:
        app01:
          ansible_host: 10.0.2.10
          app_port: 8080
        app02:
          ansible_host: 10.0.2.11
          app_port: 8080
      vars:
        app_env: production
        image_tag: latest

    # --- Database servers ---
    dbservers:
      hosts:
        db01:
          ansible_host: 10.0.3.10
          postgres_primary: true
        db02:
          ansible_host: 10.0.3.11
          postgres_primary: false
      vars:
        postgres_version: "16"

    # --- Staging environment ---
    staging:
      hosts:
        staging01:
          ansible_host: 10.0.9.10
      vars:
        app_env: staging
        image_tag: develop
