# docker-compose-web.yml — Simple web application (Nginx + React/static files)

version: "3.9"

services:
  web:
    image: nginx:1.25-alpine
    container_name: web_server
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: web_network
